<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuyển Thực Tập — Ứng dụng Tuyển dụng Thực tập</title>
  <meta name="description" content="Hệ thống quản lý tuyển dụng thực tập chuyên nghiệp — ATS Kanban, phân quyền Admin/User, SQL Cloud Database." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231ed760'/><text y='.9em' font-size='70' x='15'>💼</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #121212;
      --surface: #181818;
      --mid:     #1f1f1f;
      --card:    #252525;
      --green:   #1ed760;
      --green-d: #169c46;
      --text:    #ffffff;
      --muted:   #b3b3b3;
      --near:    #cbcbcb;
      --red:     #f3727f;
      --orange:  #ffa42b;
      --blue:    #539df5;
      --border:  rgba(255,255,255,0.08);
      --shadow:  rgba(0,0,0,0.5) 0px 8px 24px;
      --r: 8px; --r-sm: 4px; --r-full: 9999px;
      --font: 'SF Pro Display', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--card);border-radius:var(--r-full)}
    a{text-decoration:none;color:inherit}
    input,textarea,select,button{font-family:inherit}

    /* ---- LAYOUT ---- */
    #app{display:flex;flex-direction:column;min-height:100vh}
    .page{flex:1;padding:32px 24px;max-width:1280px;margin:0 auto;width:100%;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    /* ---- NAVBAR ---- */
    .navbar{
      position:sticky;top:0;z-index:100;
      background:rgba(18,18,18,.92);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;
      height:64px;padding:0 24px;max-width:1280px;margin:0 auto;
    }
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .logo-box{
      width:36px;height:36px;background:var(--green);border-radius:var(--r-sm);
      display:flex;align-items:center;justify-content:center;font-size:17px;
      box-shadow:0 0 12px rgba(30,215,96,.35)
    }
    .logo-name{font-size:19px;font-weight:800;letter-spacing:-.5px}
    .logo-name span{color:var(--green)}
    .logo-role{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-top:-3px}
    .nav-tabs{display:flex;gap:4px}
    .nav-tab{
      font-size:13px;font-weight:500;color:var(--muted);
      padding:7px 14px;border-radius:var(--r-full);border:none;
      background:transparent;cursor:pointer;transition:.12s;white-space:nowrap;
      display:flex;align-items:center;gap:6px;
    }
    .nav-tab:hover{color:var(--text);background:rgba(255,255,255,.06)}
    .nav-tab.active{color:var(--green);background:rgba(30,215,96,.1);font-weight:700}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-user{font-size:13px;color:var(--muted);text-align:right}
    .nav-user strong{display:block;color:var(--text);font-size:14px}
    .nav-user em{font-style:normal;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--green)}
    .nav-db{
      font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      padding:4px 10px;border-radius:var(--r-full);
      border:1px solid rgba(30,215,96,.2);background:rgba(30,215,96,.06);color:var(--green);
      display:flex;align-items:center;gap:5px;
    }
    .db-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ---- BUTTONS ---- */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      font-size:13px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
      border:none;cursor:pointer;border-radius:var(--r-full);transition:.12s;
      padding:11px 24px;white-space:nowrap;
    }
    .btn-green{background:var(--green);color:#000;box-shadow:0 0 16px rgba(30,215,96,.25)}
    .btn-green:hover{background:#1fdf64;transform:scale(1.02);box-shadow:0 0 24px rgba(30,215,96,.4)}
    .btn-dark{background:var(--mid);color:var(--text);border:1px solid var(--border)}
    .btn-dark:hover{background:var(--card);border-color:rgba(255,255,255,.15)}
    .btn-outline{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.25)}
    .btn-outline:hover{border-color:var(--text)}
    .btn-red{background:rgba(243,114,127,.1);color:var(--red);border:1px solid rgba(243,114,127,.2)}
    .btn-red:hover{background:var(--red);color:#fff}
    .btn-sm{padding:7px 16px;font-size:11px;letter-spacing:1px}
    .btn-xs{padding:4px 10px;font-size:10px;letter-spacing:.8px}
    .btn:disabled{opacity:.5;cursor:default;transform:none!important}

    /* ---- CARDS ---- */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:.2s}
    .card:hover{border-color:rgba(255,255,255,.14)}
    .card-sm{padding:16px}

    /* ---- FORM ---- */
    .form-group{margin-bottom:16px}
    label.fl{display:block;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .fi{
      width:100%;padding:10px 14px;font-size:14px;
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:var(--r-sm);color:var(--text);transition:.12s;
    }
    .fi:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(30,215,96,.12)}
    textarea.fi{min-height:88px;resize:vertical}
    select.fi option{background:var(--surface)}

    /* ---- STATUS BADGES ---- */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:capitalize}
    .b-applied{background:rgba(83,157,245,.12);color:var(--blue)}
    .b-screening{background:rgba(255,164,43,.12);color:var(--orange)}
    .b-interviewing{background:rgba(30,215,96,.12);color:var(--green)}
    .b-offered{background:rgba(30,215,96,.15);color:#1ed760;border:1px solid rgba(30,215,96,.2)}
    .b-rejected{background:rgba(243,114,127,.12);color:var(--red)}
    .b-candidate{background:rgba(30,215,96,.1);color:var(--green);border:1px solid rgba(30,215,96,.15)}
    .b-recruiter{background:rgba(83,157,245,.1);color:var(--blue);border:1px solid rgba(83,157,245,.15)}

    /* ---- TOAST ---- */
    #toast{
      position:fixed;bottom:24px;right:24px;z-index:9999;
      padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:500;
      box-shadow:var(--shadow);display:none;align-items:center;gap:8px;
      animation:slideIn .25s ease;
    }
    #toast.show{display:flex}
    #toast.ok{background:rgba(30,215,96,.12);color:var(--green);border:1px solid rgba(30,215,96,.2)}
    #toast.err{background:rgba(243,114,127,.12);color:var(--red);border:1px solid rgba(243,114,127,.2)}
    @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

    /* ---- MODAL ---- */
    .modal-bg{
      position:fixed;inset:0;z-index:500;
      background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;padding:16px;
    }
    .modal{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:32px;width:100%;max-width:480px;
      max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);
    }
    .modal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
    .modal-title{font-size:20px;font-weight:700}
    .modal-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:2px}
    .close-btn:hover{color:var(--text)}

    /* ---- AUTH ---- */
    #auth-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
      background:radial-gradient(ellipse 70% 60% at 30% 40%, rgba(30,215,96,.06) 0%, transparent 60%),
                 radial-gradient(ellipse 50% 70% at 80% 70%, rgba(83,157,245,.04) 0%, transparent 60%),
                 var(--bg);
    }
    .auth-box{width:100%;max-width:420px}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:36px;box-shadow:var(--shadow)}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
    .auth-title{font-size:22px;font-weight:700;margin-bottom:4px}
    .auth-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
    .role-pick{display:flex;gap:10px;margin-bottom:16px}
    .role-opt{
      flex:1;padding:10px;border-radius:var(--r-sm);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;gap:8px;
      cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);
      transition:.12s;background:transparent;
    }
    .role-opt.selected-candidate{border-color:var(--green);background:rgba(30,215,96,.08);color:var(--green)}
    .role-opt.selected-recruiter{border-color:var(--blue);background:rgba(83,157,245,.08);color:var(--blue)}
    .auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .auth-switch button{background:none;border:none;color:var(--green);cursor:pointer;font-size:13px;font-weight:600}
    .quick-logins{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
    .ql-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px}
    .ql-btn{
      width:100%;margin-bottom:6px;padding:9px 14px;
      background:var(--mid);border:1px solid var(--border);border-radius:var(--r-sm);
      display:flex;justify-content:space-between;align-items:center;
      font-size:13px;color:var(--text);cursor:pointer;transition:.12s;
    }
    .ql-btn:hover{border-color:rgba(255,255,255,.18);background:var(--card)}
    .ql-btn em{font-style:normal;font-size:11px;color:var(--muted)}

    /* ---- JOBS GRID ---- */
    .jobs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;transition:.2s;cursor:pointer}
    .job-card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px);box-shadow:rgba(0,0,0,.3) 0px 8px 16px}
    .job-dept{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
    .job-title{font-size:17px;font-weight:700;margin-bottom:10px}
    .job-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .job-meta-row{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
    .job-type-badge{
      display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;
      padding:3px 9px;border-radius:var(--r-full);
      background:rgba(30,215,96,.1);color:var(--green);border:1px solid rgba(30,215,96,.15);
    }
    .job-desc{font-size:13px;color:var(--muted);line-height:1.55;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:16px}
    .search-bar{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
    .search-bar .fi{flex:1;min-width:200px}

    /* ---- CANDIDATE DASHBOARD ---- */
    .status-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center}
    .stat-num{font-size:32px;font-weight:900;line-height:1;margin-bottom:6px}
    .stat-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .app-list{display:flex;flex-direction:column;gap:14px}
    .app-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .app-item-info h4{font-size:16px;font-weight:700;margin-bottom:3px}
    .app-item-info p{font-size:12px;color:var(--muted)}

    /* ---- ATS BOARD ---- */
    .ats-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;min-width:900px;overflow-x:auto}
    .ats-wrap{overflow-x:auto;padding-bottom:8px}
    .ats-col{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);padding:12px;min-height:480px}
    .ats-col-hd{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding-bottom:8px;margin-bottom:12px;border-bottom:2px solid;display:flex;justify-content:space-between;align-items:center}
    .ats-col-hd .cnt{background:var(--mid);padding:1px 7px;border-radius:var(--r-full);font-size:10px;color:var(--muted)}
    .col-applied .ats-col-hd{color:var(--blue);border-color:var(--blue)}
    .col-screening .ats-col-hd{color:var(--orange);border-color:var(--orange)}
    .col-interviewing .ats-col-hd{color:var(--green);border-color:var(--green)}
    .col-offered .ats-col-hd{color:#1ed760;border-color:rgba(30,215,96,.4)}
    .col-rejected .ats-col-hd{color:var(--red);border-color:var(--red)}
    .cand-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;transition:.15s}
    .cand-card:hover{border-color:rgba(255,255,255,.18)}
    .cc-name{font-size:13px;font-weight:700;margin-bottom:2px}
    .cc-role{font-size:11px;color:var(--muted);margin-bottom:7px}
    .cc-skills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .skill-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
    .cc-actions{display:flex;flex-direction:column;gap:5px}
    .cc-date{font-size:10px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
    .cc-stars{color:var(--orange);font-size:11px}

    /* ---- INTERVIEWS TABLE ---- */
    .iv-table{width:100%;border-collapse:collapse;font-size:13px}
    .iv-table th{padding:12px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
    .iv-table td{padding:14px;border-bottom:1px solid rgba(255,255,255,.04)}
    .iv-table tr:hover td{background:rgba(255,255,255,.02)}

    /* ---- PROFILE ---- */
    .profile-wrap{max-width:600px}
    .skills-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .skill-chip{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(30,215,96,.08);border:1px solid rgba(30,215,96,.15);
      color:var(--green);padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;
    }
    .skill-chip button{background:none;border:none;color:rgba(30,215,96,.6);cursor:pointer;font-size:13px;line-height:1}
    .skill-chip button:hover{color:var(--red)}

    /* ---- SECTION HEADER ---- */
    .sec-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px;flex-wrap:wrap}
    .sec-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
    .sec-sub{font-size:13px;color:var(--muted);margin-top:4px}
    .divider{height:1px;background:var(--border);margin:24px 0}

    /* ---- GRID HELPERS ---- */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

    /* ---- EMPTY STATE ---- */
    .empty{text-align:center;padding:56px 24px;color:var(--muted)}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty h3{font-size:16px;font-weight:700;color:var(--near);margin-bottom:8px}
    .empty p{font-size:13px;line-height:1.6}

    /* ---- STARS ---- */
    .star-row{display:flex;gap:8px;margin:8px 0}
    .star-btn{background:var(--mid);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;cursor:pointer;font-size:16px;transition:.12s}
    .star-btn.active,.star-btn:hover{border-color:var(--orange);background:rgba(255,164,43,.1)}

    @media(max-width:900px){
      .jobs-grid,.g3{grid-template-columns:1fr 1fr}
      .status-cards{grid-template-columns:1fr 1fr}
      .nav-tabs{display:none}
    }
    @media(max-width:600px){
      .jobs-grid,.g2,.g3,.status-cards{grid-template-columns:1fr}
      .nav-tabs{display:none}
      .page{padding:20px 14px}
    }
  
      h1, h2, h3, h4, h5, h6 { letter-spacing: -0.04em; }
    </style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- AUTH PAGE -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-box">💼</div>
      <div>
        <div class="logo-name">Tuyển<span> Thực Tập</span></div>
        <span class="logo-role">Intern Platform</span>
      </div>
    </div>
    <div class="auth-card">
      <div id="auth-form-wrap">
        <!-- injected by JS -->
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="app" style="display:none">
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo" onclick="goHome()">
        <div class="logo-box">💼</div>
        <div>
          <div class="logo-name">Tuyển<span> Thực Tập</span></div>
          <span class="logo-role" id="nav-role-label">—</span>
        </div>
      </div>
      <div class="nav-tabs" id="nav-tabs"></div>
      <div class="nav-right">
        <div class="nav-user" id="nav-user-info"></div>
        <div class="nav-db"><span class="db-dot"></span>SQL Local</div>
        <button class="btn btn-dark btn-sm" onclick="logout()">Đăng xuất</button>
      </div>
    </div>
  </nav>
  <div class="page" id="main-content"></div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-root" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
